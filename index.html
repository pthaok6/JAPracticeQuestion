<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4f1e8">
  <title>Luyện trả lời câu hỏi có tranh</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Trang đầu">
      <span class="brand-mark">話</span>
      <span>
        <strong>Luyện nói JPD123</strong>
        <small>Picture speaking practice</small>
      </span>
    </a>

    <div class="set-picker">
      <label for="setSelect">Bộ đề</label>
      <select id="setSelect" aria-label="Chọn bộ đề"></select>
    </div>
  </header>

  <main class="app-shell">
    <section class="viewer-card" aria-labelledby="pictureHeading">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Tranh luyện nói</p>
          <h1 id="pictureHeading">B-4</h1>
        </div>
        <button id="fullscreenButton" class="icon-button" type="button" title="Xem toàn màn hình" aria-label="Xem ảnh toàn màn hình">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5m13 5h5v-5"/></svg>
        </button>
      </div>

      <div id="pictureFrame" class="picture-frame">
        <img id="pictureImage" alt="Tranh của bộ đề B-4">
      </div>

      <div class="navigation">
        <button id="previousButton" class="secondary-button" type="button">
          <span aria-hidden="true">←</span> Đề trước
        </button>
        <span id="positionLabel" class="position-label"></span>
        <button id="nextButton" class="secondary-button" type="button">
          Đề sau <span aria-hidden="true">→</span>
        </button>
      </div>
    </section>

    <aside class="question-card" aria-labelledby="questionHeading">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Câu hỏi tương ứng</p>
          <h2 id="questionHeading">Luyện nghe & trả lời</h2>
        </div>
        <span id="questionBadge" class="badge">B-4</span>
      </div>

      <div id="questionAvailable">
        <button id="revealButton" class="primary-button wide" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
          Hiện ảnh câu hỏi
        </button>

        <div id="questionImageWrap" class="question-image-wrap" hidden>
          <img id="questionImage" alt="Ảnh câu hỏi tương ứng">
        </div>

        <div class="reader">
          <div class="reader-title">
            <div>
              <h3>Nội dung để đọc</h3>
              <p>Nhập hoặc chỉnh sửa câu hỏi tiếng Nhật nếu cần.</p>
            </div>
            <button id="toggleTextButton" class="text-button" type="button" aria-pressed="true">Hiện nội dung</button>
          </div>

          <div id="readerStatus" class="status" role="status" aria-live="polite"></div>
          <div class="question-text-wrap">
            <textarea id="questionText" class="is-content-hidden" rows="7" lang="ja" readonly placeholder="Nhập câu hỏi tiếng Nhật tại đây…"></textarea>
          </div>

          <div class="speech-settings">
            <label>
              <span>Giọng đọc</span>
              <select id="voiceSelect" aria-label="Chọn giọng đọc"></select>
            </label>
            <label>
              <span>Tốc độ <output id="rateOutput">0.9×</output></span>
              <input id="rateInput" type="range" min="0.5" max="1.4" value="0.9" step="0.1">
            </label>
          </div>

          <div class="reader-actions">
            <button id="stopButton" class="secondary-button" type="button">Dừng</button>
          </div>

          <div class="question-reader-actions" aria-label="Đọc từng câu hỏi">
            <button class="secondary-button question-speak-button" type="button" data-question-index="0">Đọc câu 1</button>
            <button class="secondary-button question-speak-button" type="button" data-question-index="1">Đọc câu 2</button>
            <button class="secondary-button question-speak-button" type="button" data-question-index="2">Đọc câu 3</button>
          </div>

          <label class="check-row">
            <input id="autoReadInput" type="checkbox">
            <span>Tự đọc khi chuyển sang đề có nội dung</span>
          </label>
        </div>
      </div>

      <div id="missingQuestion" class="empty-state" hidden>
        <span class="empty-icon">?</span>
        <h3>Chưa có ảnh câu hỏi</h3>
        <p>Thư mục hiện chưa chứa file <strong id="missingFilename"></strong>.</p>
      </div>
    </aside>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button id="closeLightbox" class="lightbox-close" type="button" aria-label="Đóng ảnh">×</button>
    <img id="lightboxImage" alt="">
  </div>

  <script src="app.js"></script>
</body>
</html>
